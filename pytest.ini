[pytest]
# Django 설정 파일 경로 
DJANGO_SETTINGS_MODULE = config.settings.dev

# 테스트 파일 탐색 규칙
python_files = tests.py test_*.py *_tests.py *_test.py


# 3. 공통 실행 옵션 (Best Practice: 보수적이고 안전하게)
# - --reuse-db 제거: 데이터 오염으로 인한 테스트 실패 원천 차단
# - --strict-markers: 오타 난 마커를 사용하면 에러를 발생시켜 오작동 방지
# - --tb=short: 에러 발생 시 Traceback(로그)을 너무 길지 않게 요약해서 출력
addopts = --strict-markers --tb=short --cov=apps --cov-report=term-missing --cov-fail-under=80

# 4. 커스텀 마커 등록 (선택적 테스트 실행을 위함)
# 테스트 함수나 클래스 바로 위에
# @pytest.mark.[마커이름] 데코레이터를 붙여
markers =
    slow: 실행 시간이 오래 걸리는 테스트 (외부 API 연동 등)
    core: 핵심 비즈니스 로직 테스트 (배포 전 필수 확인용)
    users: 유저 도메인 관련 테스트
    posts: 게시글 도메인 관련 테스트
    comment: 댓글 관련

# 5. 불필요한 경고 숨기기 (터미널 가독성 향상)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning