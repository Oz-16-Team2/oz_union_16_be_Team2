name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: resource/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "resource/docker-compose.prod.yml"
          target: "~/app"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export GITHUB_REPOSITORY=${{ github.repository }}
            if ! command -v docker &> /dev/null; then
              sudo apt update
              sudo apt install -y docker.io docker-compose
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            mkdir -p ~/app/resource
            mkdir -p ~/app/envs

            if [ ! -f ~/app/envs/.env ]; then
              echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> ~/app/envs/.env
              echo "DEBUG=False" >> ~/app/envs/.env
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> ~/app/envs/.env
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> ~/app/envs/.env
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ~/app/envs/.env
              echo "POSTGRES_HOST=db" >> ~/app/envs/.env
              echo "POSTGRES_PORT=5432" >> ~/app/envs/.env
            fi

            cd ~/app

            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker-compose -f resource/docker-compose.prod.yml --env-file envs/.env pull web
            docker-compose -f resource/docker-compose.prod.yml --env-file envs/.env up -d

            docker-compose -f resource/docker-compose.prod.yml --env-file envs/.env exec -T web uv run python manage.py migrate --no-input

            docker image prune -f
