name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: resource/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "resource/docker-compose.prod.yml,resource/nginx/nginx.conf,resource/nginx/nginx.http-only.conf"
          target: "~/app"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export GITHUB_REPOSITORY=${{ github.repository }}
            if ! command -v docker &> /dev/null; then
              sudo apt update
              sudo apt install -y docker.io docker-compose
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            mkdir -p ~/app/resource
            mkdir -p ~/app/envs

            {
              echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"
              echo "DEBUG=False"
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "POSTGRES_HOST=db"
              echo "POSTGRES_PORT=5432"
              echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}"
              echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}"
              echo "AWS_STORAGE_BUCKET_NAME=${{ secrets.AWS_STORAGE_BUCKET_NAME }}"
              echo "AWS_REGION=${{ secrets.AWS_REGION }}"
              echo "CORS_ALLOWED_ORIGINS=https://oz-union-16-fe-team2.vercel.app"
              echo "EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}"
              echo "EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}"
              echo "GITHUB_REPOSITORY=${{ github.repository }}"
            } > ~/app/envs/.env

            cd ~/app

            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            COMPOSE="docker-compose -f resource/docker-compose.prod.yml --env-file envs/.env"
            DOMAIN="jaksim.duckdns.org"
            CERT_VOLUME="$(docker volume ls -q | grep -E 'certbot_conf$' | head -n1)"

            HAS_CERT=0
            if [ -n "$CERT_VOLUME" ] && docker run --rm -v "$CERT_VOLUME:/etc/letsencrypt" alpine \
                 test -f "/etc/letsencrypt/live/$DOMAIN/fullchain.pem"; then
              HAS_CERT=1
            fi

            $COMPOSE pull web

            if [ "$HAS_CERT" = "0" ]; then
              echo "No TLS cert found — running first-time certbot bootstrap"
              cp resource/nginx/nginx.conf resource/nginx/nginx.conf.https
              cp resource/nginx/nginx.http-only.conf resource/nginx/nginx.conf

              $COMPOSE up -d db redis web nginx

              $COMPOSE run --rm certbot \
                certonly --webroot -w /var/www/certbot \
                -d "$DOMAIN" \
                --email "${{ secrets.CERTBOT_EMAIL }}" --agree-tos --no-eff-email --non-interactive

              cp resource/nginx/nginx.conf.https resource/nginx/nginx.conf
            fi

            $COMPOSE up -d

            $COMPOSE exec -T web uv run python manage.py migrate --no-input
            $COMPOSE exec -T web uv run python manage.py collectstatic --no-input

            docker exec prod_nginx nginx -s reload || true

            docker image prune -f
