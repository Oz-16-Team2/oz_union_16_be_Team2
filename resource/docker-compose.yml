services:
  db:
    image: postgres:17
    container_name: jaksim_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jaksim}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zseqsc123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: jaksim_redis
    ports:
      - "6379:6379"

  web:
    build:
      context: ..
      dockerfile: resource/Dockerfile
    container_name: jaksim_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
      - /app/.venv  # [수정] 로컬 .venv가 컨테이너에 마운트되지 않도록 익명 볼륨으로 격리
    command: >
      sh -c "echo 'Server is running at http://127.0.0.1:8000/' && 
             uv run python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ../envs/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: