services:
  db:
    image: postgres:17
    container_name: jaksim_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
  redis:
    image: redis:7
    container_name: jaksim_redis
    restart: always
    networks:
      - backend
    ports:
      - "6379:6379"

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: jaksim_web
    restart: always
    env_file:
      - ../envs/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: prod_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - web
    networks:
      - backend

  certbot:
    image: certbot/certbot
    container_name: prod_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:

networks:
  backend: