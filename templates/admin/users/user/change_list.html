{% extends "admin/fixed_change_list.html" %}

{% block extrahead %}
{{ block.super }}
<style>
    .actions {
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        flex-wrap: wrap !important;
    }

    .actions p.datetime {
        display: inline-flex !important;
        align-items: center !important;
        gap: 6px !important;
        margin: 0 !important;
    }

    .actions p.datetime br {
        display: none !important;
    }

    .actions .action-counter {
        display: none !important;
    }


</style>
{% endblock %}

{% block search %}
<form method="get" id="changelist-search" style="margin:0 0 12px 0;">
    <div style="display:flex; gap:8px; margin:0 0 12px 0;">
        {% if user_status_filter %}
            <input type="hidden" name="user_status_filter" value="{{ user_status_filter }}">
        {% endif %}

        <select name="filter_type" style="width:145px; height:38px; border:1px solid #ced4da; border-radius:4px; padding:0 8px;">
            <option value="" {% if not user_filter_type %}selected{% endif %}>전체 검색</option>
            <option value="user_id" {% if user_filter_type == "user_id" %}selected{% endif %}>유저 ID</option>
            <option value="nickname" {% if user_filter_type == "nickname" %}selected{% endif %}>닉네임</option>
            <option value="email" {% if user_filter_type == "email" %}selected{% endif %}>이메일</option>
        </select>

        <input type="text" name="q" value="{{ request.GET.q|default:'' }}" placeholder="검색어 입력" style="width:260px; height:38px; border:1px solid #ced4da; border-radius:4px; padding:0 10px;">
        <button type="submit" class="btn btn-primary" style="height:38px; padding:0 16px;">검색</button>
    </div>
</form>

<div style="display:flex; gap:8px; margin:0 0 12px;">
    <a href="?{% if request.GET.q %}q={{ request.GET.q|urlencode }}&{% endif %}{% if user_filter_type %}filter_type={{ user_filter_type }}&{% endif %}"
       style="padding:8px 14px; border-radius:8px; text-decoration:none; background:{% if not user_status_filter %}#4f7cff{% else %}#eee{% endif %}; color:{% if not user_status_filter %}#fff{% else %}#333{% endif %};">전체</a>

    <a href="?{% if request.GET.q %}q={{ request.GET.q|urlencode }}&{% endif %}{% if user_filter_type %}filter_type={{ user_filter_type }}&{% endif %}user_status_filter=active"
       style="padding:8px 14px; border-radius:8px; text-decoration:none; background:{% if user_status_filter == 'active' %}#4f7cff{% else %}#eee{% endif %}; color:{% if user_status_filter == 'active' %}#fff{% else %}#333{% endif %};">정상</a>

    <a href="?{% if request.GET.q %}q={{ request.GET.q|urlencode }}&{% endif %}{% if user_filter_type %}filter_type={{ user_filter_type }}&{% endif %}user_status_filter=suspended"
       style="padding:8px 14px; border-radius:8px; text-decoration:none; background:{% if user_status_filter == 'suspended' %}#4f7cff{% else %}#eee{% endif %}; color:{% if user_status_filter == 'suspended' %}#fff{% else %}#333{% endif %};">정지</a>
</div>
{% endblock %}
