{% extends "admin/fixed_change_list.html" %}

{% block search %}
<form method="get" id="changelist-search" style="margin:0 0 12px 0;">
    <div style="display:flex; gap:8px; margin:0 0 12px 0;">
        {% if status_filter %}
            <input type="hidden" name="status_filter" value="{{ status_filter }}">
        {% endif %}

        <select name="target_type_filter" style="width:145px; height:38px; border:1px solid #ced4da; border-radius:4px; padding:0 8px;">
            <option value="" {% if not target_type_filter %}selected{% endif %}>대상 전체</option>
            <option value="post" {% if target_type_filter == "post" %}selected{% endif %}>게시글</option>
            <option value="comment" {% if target_type_filter == "comment" %}selected{% endif %}>댓글</option>
        </select>

        <input type="text" name="q" value="{{ request.GET.q|default:'' }}" placeholder="검색어 입력" style="width:260px; height:38px; border:1px solid #ced4da; border-radius:4px; padding:0 10px;">
        <button type="submit" class="btn btn-primary" style="height:38px; padding:0 16px;">검색</button>
    </div>
</form>

<div style="display:flex; gap:8px; margin:0 0 12px;">
    <a href="?{% if target_type_filter %}target_type_filter={{ target_type_filter }}&{% endif %}{% if request.GET.q %}q={{ request.GET.q|urlencode }}&{% endif %}"
       style="padding:8px 14px; border-radius:8px; text-decoration:none; background:{% if not status_filter %}#4f7cff{% else %}#eee{% endif %}; color:{% if not status_filter %}#fff{% else %}#333{% endif %};">전체</a>

    <a href="?{% if target_type_filter %}target_type_filter={{ target_type_filter }}&{% endif %}{% if request.GET.q %}q={{ request.GET.q|urlencode }}&{% endif %}status_filter=pending"
       style="padding:8px 14px; border-radius:8px; text-decoration:none; background:{% if status_filter == 'pending' %}#4f7cff{% else %}#eee{% endif %}; color:{% if status_filter == 'pending' %}#fff{% else %}#333{% endif %};">대기중</a>

    <a href="?{% if target_type_filter %}target_type_filter={{ target_type_filter }}&{% endif %}{% if request.GET.q %}q={{ request.GET.q|urlencode }}&{% endif %}status_filter=handled"
       style="padding:8px 14px; border-radius:8px; text-decoration:none; background:{% if status_filter == 'handled' %}#4f7cff{% else %}#eee{% endif %}; color:{% if status_filter == 'handled' %}#fff{% else %}#333{% endif %};">처리완료</a>

    <a href="?{% if target_type_filter %}target_type_filter={{ target_type_filter }}&{% endif %}{% if request.GET.q %}q={{ request.GET.q|urlencode }}&{% endif %}status_filter=dismissed"
       style="padding:8px 14px; border-radius:8px; text-decoration:none; background:{% if status_filter == 'dismissed' %}#4f7cff{% else %}#eee{% endif %}; color:{% if status_filter == 'dismissed' %}#fff{% else %}#333{% endif %};">기각</a>
</div>
{% endblock %}
