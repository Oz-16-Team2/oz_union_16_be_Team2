{% extends "admin/fixed_change_list.html" %}

{% block search %}
{{ block.super }}

<script>
document.addEventListener("DOMContentLoaded", function () {
    const input = document.querySelector('input[name="q"]');
    if (!input) return;

    const searchForm = input.closest("form");
    if (!searchForm) return;

    if (document.querySelector("#filter-type-select")) return;

    const select = document.createElement("select");
    select.name = "filter_type";
    select.id = "filter-type-select";
    select.style.width = "145px";
    select.style.height = "38px";
    select.style.border = "1px solid #ced4da";
    select.style.borderRadius = "4px";
    select.style.padding = "0 8px";
    select.style.margin = "0 8px 0 0";
    select.style.backgroundColor = "#fff";
    select.style.display = "inline-block";
    select.style.boxSizing = "border-box";
    select.style.transform = "translateY(-4px)";

    const options = [
        { value: "", label: "전체 검색" },
        { value: "post_id", label: "게시글 ID 검색" },
        { value: "user_id", label: "유저 ID 검색" },
    ];

    options.forEach(function (opt) {
        const option = document.createElement("option");
        option.value = opt.value;
        option.textContent = opt.label;

        if (opt.value === "{{ post_filter_type|default:'' }}") {
            option.selected = true;
        }

        select.appendChild(option);
    });

    input.placeholder = "검색어 입력";
    input.parentNode.insertBefore(select, input);
    input.style.height = "38px";
    input.style.verticalAlign = "middle";
});
</script>
{% endblock %}
