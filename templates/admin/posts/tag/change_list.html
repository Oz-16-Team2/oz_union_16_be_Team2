{% extends "admin/fixed_change_list.html" %}

{% block search %}
<form method="get" id="changelist-search" style="margin:0 0 12px 0;">
    <div style="display:flex; gap:8px; margin:0 0 12px 0;">
        {% for key, value in request.GET.items %}
            {% if key != "q" and key != "filter_type" and key != "e" %}
                <input type="hidden" name="{{ key }}" value="{{ value }}">
            {% endif %}
        {% endfor %}

        <select name="filter_type" style="width:145px; height:38px; border:1px solid #ced4da; border-radius:4px; padding:0 8px;">
            <option value="" {% if not tag_filter_type %}selected{% endif %}>전체 검색</option>
            <option value="tag_id" {% if tag_filter_type == "tag_id" %}selected{% endif %}>태그 ID</option>
            <option value="name" {% if tag_filter_type == "name" %}selected{% endif %}>태그 이름</option>
        </select>

        <input type="text" name="q" value="{{ request.GET.q|default:'' }}" placeholder="검색어 입력" style="width:260px; height:38px; border:1px solid #ced4da; border-radius:4px; padding:0 10px;">
        <button type="submit" class="btn btn-primary" style="height:38px; padding:0 16px;">검색</button>
    </div>
</form>

<div style="display:flex; gap:8px; margin:0 0 12px;">

    <a href="?active_filter="
       style="padding:8px 14px; border-radius:8px; text-decoration:none;
       background:{% if not active_filter %}#4f7cff{% else %}#eee{% endif %};
       color:{% if not active_filter %}#fff{% else %}#333{% endif %};">
        전체
    </a>

    <a href="?active_filter=true"
       style="padding:8px 14px; border-radius:8px; text-decoration:none;
       background:{% if active_filter == 'true' %}#4f7cff{% else %}#eee{% endif %};
       color:{% if active_filter == 'true' %}#fff{% else %}#333{% endif %};">
        활성
    </a>

    <a href="?active_filter=false"
       style="padding:8px 14px; border-radius:8px; text-decoration:none;
       background:{% if active_filter == 'false' %}#4f7cff{% else %}#eee{% endif %};
       color:{% if active_filter == 'false' %}#fff{% else %}#333{% endif %};">
        비활성
    </a>

</div>
{% endblock %}
